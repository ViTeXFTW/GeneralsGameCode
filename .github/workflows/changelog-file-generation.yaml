name: Generate Changelog
on:
  pull_request:
    types: [closed]

  workflow_dispatch:
    inputs:
        pr_number:
            description: 'Pull Request Number'
            type: number
            required: true
            default: 0
        force:
            description: 'Force run even if PR is not merged'
            type: choice
            required: false
            default: ''
            options:
                - '--force'

env:
    SCRIPTS_PATH: .github/workflows/scripts/changelog_file_generation
    CONFIG_PATH: .github/workflows/scripts/changelog_file_generation/pr_changelog_config.yaml

jobs:
  process-merged-pr:
    if: github.event.pull_request.merged
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ${{ env.SCRIPTS_PATH }}/requirements.txt

    - name: Run changelog generator
      run: |
        python generate_pr_yaml.py \
          --pr-number ${{ github.event.pull_request.number }} \
          --repo ${{ github.repository }} \
          --token ${{ secrets.GITHUB_TOKEN }} \
          --config ${{ env.CONFIG_PATH }} \

    - name: Commit generated files
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add changelogs/unreleased/*
        git commit -m "Add changelog for PR #${{ github.event.pull_request.number }}" || echo "No changes to commit"
        git push